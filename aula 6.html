<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
            font: normal 20pt Arial, sans-serif;
        }

    </style>
</head>

<body>

    <script>
        var nome = window.prompt("Qual é o seu nome?"); //exibe uma caixa de entrada para o usuário e armazena o valor na variável nome
        document.write(`Olá, ${nome}! Seu nome tem ${nome.length} letras.<br>`)
        document.write(`Olá, ${nome}! Seu nome em letras maiúsculas é: ${nome.toUpperCase()}`) //exibe uma mensagem de boas-vindas com o nome do usuário e a quantidade de letras do nome
    </script>
</body>

</html>
